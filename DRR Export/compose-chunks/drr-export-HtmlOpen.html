<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Role Repository — Application Record | CIBC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 12px; }
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, Helvetica, sans-serif;
      background: #e8eaed;
      color: #111827;
      line-height: 1.4;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    :root {
      --brand:          rgb(169, 29, 65);
      --brand-dark:     rgb(118, 18, 44);
      --brand-light:    rgb(208, 55, 93);
      --brand-subtle:   rgba(169, 29, 65, 0.06);
      --brand-border:   rgba(169, 29, 65, 0.16);
      --text-primary:   #111827;
      --text-secondary: #374151;
      --text-muted:     #9ca3af;
      --border:         #e5e7eb;
      --surface:        #f9fafb;
      --white:          #ffffff;
    }
    .page {
      max-width: 820px;
      margin: 20px auto;
      background: var(--white);
      box-shadow: 0 6px 48px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
    }
    @media print {
      body  { background: white; }
      .page { max-width: 100%; margin: 0; box-shadow: none; }
    }
    @page {
      size: A4;
      margin: 10mm 10mm 10mm 10mm;
    }
    .doc-header {
      background: linear-gradient(148deg, var(--brand-dark) 0%, var(--brand) 52%, var(--brand-light) 100%);
      padding: 22px 28px 18px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .doc-header::before {
      content: '';
      position: absolute;
      top: -50px; right: -30px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }
    .doc-header::after {
      content: '';
      position: absolute;
      bottom: -70px; right: 100px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }
    .header-single-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      position: relative;
      z-index: 1;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo {
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 14px rgba(0,0,0,0.22);
    }
    .header-logo svg { display: block; }
    .header-org-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.58);
      margin-bottom: 4px;
    }
    .header-app-name {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.15;
    }
    .retention-badge {
      flex-shrink: 0;
      background: rgba(255,255,255,0.13);
      border: 1.5px solid rgba(255,255,255,0.28);
      border-radius: 8px;
      padding: 7px 14px;
      text-align: center;
    }
    .retention-badge-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.58);
      margin-bottom: 3px;
    }
    .retention-badge-years {
      display: block;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .retention-badge-years-suffix {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }
    .header-side-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .header-generated-date {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255,255,255,0.82);
      line-height: 1.3;
      text-align: center;
    }
    .header-record-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.18);
    }
    .retention-notice {
      background: var(--brand-subtle);
      border-bottom: 1px solid var(--brand-border);
      padding: 8px 28px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .retention-notice-icon {
      font-size: 15px;
      line-height: 1.4;
      flex-shrink: 0;
    }
    .retention-notice-text {
      font-size: 10px;
      color: var(--brand-dark);
      font-weight: 500;
      line-height: 1.4;
    }
    .retention-notice-text strong { font-weight: 800; }
    .doc-body {
      padding: 22px 28px 28px;
    }
    .section {
      margin-bottom: 20px;
    }
    .section:last-child { margin-bottom: 0; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 2px solid var(--brand);
      padding-bottom: 6px;
      margin-bottom: 10px;
    }
    .section-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .section-title {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--brand);
    }
    .field-grid {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .field-grid.cols-1 { grid-template-columns: 1fr; }
    .field-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .field {
      padding: 9px 11px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--white);
    }
    .field-grid:not(.cols-1):not(.cols-3) .field:nth-child(2n) { border-right: none; }
    .field-grid.cols-3 .field:nth-child(3n) { border-right: none; }
    .field-grid.cols-1 .field { border-right: none; }
    .field.span-full {
      grid-column: 1 / -1;
      border-right: none;
    }
    .field.shaded { background: var(--surface); }
    .field.field-last { border-bottom: none; }
    .field-label {
      font-size: 8.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .field-value {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.35;
    }
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .stakeholder-count {
      display: inline-block;
      margin-left: 8px;
      background: var(--brand);
      color: white;
      font-size: 9px;
      font-weight: 700;
      border-radius: 20px;
      padding: 1px 7px;
      vertical-align: middle;
    }
    table.sh-table {
      width: 100%;
      border-collapse: collapse;
    }
    table.sh-table thead tr { background: var(--brand); }
    table.sh-table thead th {
      padding: 7px 9px;
      text-align: left;
      font-size: 8.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: white;
      white-space: nowrap;
    }
    table.sh-table tbody tr { border-bottom: 1px solid var(--border); }
    table.sh-table tbody tr:last-child { border-bottom: none; }
    table.sh-table tbody tr:nth-child(odd)  { background: var(--white); }
    table.sh-table tbody tr:nth-child(even) { background: var(--surface); }
    table.sh-table tbody td {
      padding: 7px 9px;
      vertical-align: middle;
      color: var(--text-primary);
      font-size: 11px;
    }
    table.sh-table tbody td.col-email {
      font-size: 11px;
      color: var(--brand-dark);
    }
    .doc-footer {
      background: var(--surface);
      border-top: 2px solid var(--border);
      padding: 10px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .footer-left {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .footer-left strong {
      color: var(--text-secondary);
      font-weight: 700;
    }
    .footer-right {
      text-align: right;
      flex-shrink: 0;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .footer-right strong {
      color: var(--text-secondary);
      font-weight: 700;
    }
    @media print {
      html { font-size: 11px; }
      .page { margin: 0; max-width: 100%; }
      .doc-header { padding: 16px 18px 14px; }
      .retention-notice { padding: 6px 18px; }
      .doc-body { padding: 16px 18px 18px; }
      .section { margin-bottom: 14px; }
      .field { padding: 6px 8px; }
      table.sh-table thead th { padding: 6px 7px; }
      table.sh-table tbody td { padding: 6px 7px; }
      .doc-footer { padding: 8px 18px; }
      .header-side-meta { gap: 4px; }
      .header-generated-date, .footer-right { font-size: 9px; }
    }
    .no-break { page-break-inside: avoid; break-inside: avoid; }
    .break-before { page-break-before: always; break-before: page; }
  </style>
</head>
<body>
<div class="page">
