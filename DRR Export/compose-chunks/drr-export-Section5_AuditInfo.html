    <div class="section">
      <div class="section-header">
        <div class="section-icon">&#128337;</div>
        <span class="section-title">
          Record Audit Information
          <span class="stakeholder-count">@{length(body('Select_EventTrackers'))}</span>
        </span>
      </div>

      <div class="table-wrap">
        <table class="sh-table">
          <thead>
            <tr>
              <th style="width:12%">Action</th>
              <th style="width:20%">Affected Role</th>
              <th style="width:20%">Previous Stakeholder</th>
              <th style="width:20%">New Stakeholder</th>
              <th style="width:14%">Performed By</th>
              <th style="width:14%">Performed On</th>
            </tr>
          </thead>
          <tbody>
            @{if(equals(length(body('Select_EventTrackers')), 0), '<tr><td colspan="6" style="text-align:center;color:#6b7280;font-style:italic;">No audit records available.</td></tr>', join(body('Select_EventTrackerRows'), ''))}
          </tbody>
        </table>
      </div>
    </div>
